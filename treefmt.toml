# treefmt formatter multiplexer — config consumed by `nix fmt` and the
# treefmt flake check. https://github.com/numtide/treefmt

[formatter.nixfmt]
command = "nixfmt"
includes = ["*.nix"]

[formatter.stylua]
command = "stylua"
includes = ["*.lua"]

[formatter.shfmt]
command = "shfmt"
options = ["-i", "2", "-w"]
includes = ["*.sh", "*.bash"]

[formatter.taplo]
command = "taplo"
options = ["format"]
includes = ["*.toml"]
