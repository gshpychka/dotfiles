name: check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      # Fleet-wide eval: all systems, no machine builds.
      - run: nix flake check --all-systems --no-build
      # --no-build skips the check derivations, so build the lint/format checks to run them.
      - run: nix build --no-link -L .#checks.x86_64-linux.statix .#checks.x86_64-linux.deadnix .#checks.x86_64-linux.treefmt
